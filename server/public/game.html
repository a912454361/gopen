<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>万古长夜 - 国风粒子卡牌</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'STKaiti', 'KaiTi', serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      color: #e8d5b7;
      overflow-x: hidden;
    }

    /* 粒子背景 */
    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px; height: 4px;
      background: radial-gradient(circle, #ffd700 0%, transparent 70%);
      border-radius: 50%;
      animation: float 8s infinite ease-in-out;
      opacity: 0.6;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
      50% { transform: translateY(-100px) rotate(180deg); opacity: 1; }
    }

    /* 主容器 */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* 顶部导航 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      background: linear-gradient(180deg, rgba(26,26,46,0.9) 0%, transparent 100%);
      border-bottom: 1px solid rgba(255,215,0,0.3);
      margin-bottom: 20px;
    }

    .logo {
      font-size: 32px;
      font-weight: bold;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(255,215,0,0.5);
      letter-spacing: 8px;
    }

    .player-info {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255,215,0,0.1);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 20px;
    }

    .stat-icon {
      width: 24px; height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .stat-value {
      font-size: 18px;
      color: #ffd700;
      font-weight: bold;
    }

    /* 功能区切换 */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 12px 30px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 25px;
      color: #e8d5b7;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 16px;
    }

    .tab:hover, .tab.active {
      background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,140,0,0.2));
      border-color: #ffd700;
      color: #ffd700;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255,215,0,0.3);
    }

    /* 内容区域 */
    .content {
      display: none;
      animation: fadeIn 0.5s;
    }

    .content.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 阵营选择 */
    .factions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .faction-card {
      padding: 20px;
      background: rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }

    .faction-card:hover {
      transform: translateY(-5px) scale(1.02);
    }

    .faction-card.selected {
      border-color: #ffd700;
      box-shadow: 0 0 30px rgba(255,215,0,0.4);
    }

    .faction-icon {
      width: 80px; height: 80px;
      margin: 0 auto 15px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .faction-name {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .faction-desc {
      font-size: 14px;
      opacity: 0.7;
    }

    /* 卡牌网格 */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }

    /* 卡牌 */
    .card {
      position: relative;
      aspect-ratio: 3/4;
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-style: preserve-3d;
    }

    .card:hover {
      transform: translateY(-10px) rotateY(5deg);
      box-shadow: 0 20px 40px rgba(255,215,0,0.3);
    }

    .card-inner {
      position: relative;
      width: 100%; height: 100%;
      background: linear-gradient(180deg, rgba(26,26,46,0.9) 0%, rgba(10,10,15,0.95) 100%);
      border: 2px solid;
      border-radius: 15px;
      overflow: hidden;
    }

    .card-image {
      width: 100%; height: 60%;
      object-fit: cover;
    }

    .card-info {
      padding: 10px;
      text-align: center;
    }

    .card-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .card-rarity {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 10px;
      display: inline-block;
      margin-bottom: 5px;
    }

    .card-stats {
      display: flex;
      justify-content: space-around;
      font-size: 12px;
      margin-top: 8px;
    }

    .card-stat {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    /* 稀有度颜色 */
    .rarity-凡品 { border-color: #8b8b8b; }
    .rarity-灵品 { border-color: #4fc3f7; }
    .rarity-仙品 { border-color: #ab47bc; }
    .rarity-圣品 { border-color: #ff9800; }
    .rarity-万古品 { 
      border-color: #ffd700;
      animation: glow 2s infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 10px #ffd700; }
      50% { box-shadow: 0 0 30px #ffd700, 0 0 60px #ff8c00; }
    }

    /* 抽卡区域 */
    .draw-area {
      text-align: center;
      padding: 40px;
    }

    .draw-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .draw-btn {
      padding: 15px 40px;
      font-size: 18px;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      border: none;
      border-radius: 30px;
      color: #1a1a2e;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .draw-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(255,215,0,0.5);
    }

    .draw-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .draw-cost {
      font-size: 14px;
      margin-top: 5px;
      color: #e8d5b7;
    }

    /* 抽卡结果 */
    .draw-result {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .draw-result.show { display: flex; }

    .draw-cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 30px;
    }

    .draw-card-item {
      animation: cardReveal 0.6s ease-out forwards;
      opacity: 0;
      transform: translateY(100px) rotateY(180deg);
    }

    @keyframes cardReveal {
      to {
        opacity: 1;
        transform: translateY(0) rotateY(0);
      }
    }

    .close-result {
      padding: 12px 40px;
      background: rgba(255,255,255,0.1);
      border: 1px solid #ffd700;
      border-radius: 20px;
      color: #ffd700;
      cursor: pointer;
      font-size: 16px;
    }

    /* 对战区域 */
    .battle-arena {
      position: relative;
      min-height: 600px;
      background: linear-gradient(180deg, rgba(26,26,46,0.5) 0%, rgba(10,10,15,0.8) 100%);
      border-radius: 20px;
      border: 1px solid rgba(255,215,0,0.3);
      padding: 20px;
      overflow: hidden;
    }

    .battle-field {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 400px;
      position: relative;
    }

    .player-side {
      width: 45%;
      text-align: center;
    }

    .player-avatar {
      width: 120px; height: 120px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      box-shadow: 0 0 30px rgba(255,215,0,0.5);
    }

    .player-name {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .hp-bar {
      width: 100%;
      height: 20px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .hp-fill {
      height: 100%;
      background: linear-gradient(90deg, #e74c3c, #c0392b);
      transition: width 0.5s;
    }

    .hp-text {
      font-size: 18px;
      color: #e74c3c;
    }

    .mana-bar {
      width: 100%;
      height: 15px;
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
      overflow: hidden;
    }

    .mana-fill {
      height: 100%;
      background: linear-gradient(90deg, #3498db, #2980b9);
      transition: width 0.5s;
    }

    .vs-icon {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 60px;
      color: #ffd700;
      text-shadow: 0 0 30px rgba(255,215,0,0.8);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.1); }
    }

    /* 手牌 */
    .hand {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .hand-card {
      width: 100px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .hand-card:hover {
      transform: translateY(-20px);
    }

    .hand-card.selected {
      transform: translateY(-30px);
      box-shadow: 0 20px 40px rgba(255,215,0,0.5);
    }

    /* 战斗日志 */
    .battle-log {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      max-height: 150px;
      overflow-y: auto;
    }

    .log-entry {
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 14px;
    }

    .log-entry:last-child { border: none; }

    .damage { color: #e74c3c; }
    .heal { color: #2ecc71; }

    /* 排行榜 */
    .ranking-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      overflow: hidden;
    }

    .ranking-table th,
    .ranking-table td {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid rgba(255,215,0,0.2);
    }

    .ranking-table th {
      background: rgba(255,215,0,0.1);
      color: #ffd700;
    }

    .ranking-table tr:hover {
      background: rgba(255,215,0,0.05);
    }

    .rank-1 { color: #ffd700; }
    .rank-2 { color: #c0c0c0; }
    .rank-3 { color: #cd7f32; }

    /* 特效层 */
    .effect-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 2000;
    }

    .attack-effect {
      position: absolute;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(255,215,0,0.8) 0%, transparent 70%);
      border-radius: 50%;
      animation: explode 0.5s ease-out forwards;
    }

    @keyframes explode {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(3); opacity: 0; }
    }

    /* 返回按钮 */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: rgba(255,215,0,0.1);
      border: 1px solid #ffd700;
      border-radius: 20px;
      color: #ffd700;
      cursor: pointer;
      z-index: 100;
      text-decoration: none;
    }

    /* 登录区域 */
    .login-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      padding: 40px;
      background: rgba(26,26,46,0.9);
      border: 2px solid rgba(255,215,0,0.3);
      border-radius: 20px;
      text-align: center;
      min-width: 350px;
    }

    .login-title {
      font-size: 36px;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-input {
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 10px;
      color: #e8d5b7;
      font-size: 16px;
    }

    .login-input::placeholder {
      color: rgba(232,213,183,0.5);
    }

    .login-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      border: none;
      border-radius: 10px;
      color: #1a1a2e;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .switch-btn {
      background: transparent;
      border: 1px solid #ffd700;
      color: #ffd700;
    }

    .error-msg {
      color: #e74c3c;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- 粒子背景 -->
  <div id="particles"></div>
  
  <!-- 特效层 -->
  <div class="effect-layer" id="effectLayer"></div>

  <!-- 登录界面 -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h1 class="login-title">万古长夜</h1>
      <input type="text" class="login-input" id="username" placeholder="用户名">
      <input type="password" class="login-input" id="password" placeholder="密码">
      <input type="text" class="login-input" id="nickname" placeholder="昵称（注册时填写）" style="display:none">
      <button class="login-btn" id="loginBtn">登录</button>
      <button class="login-btn switch-btn" id="switchBtn">注册账号</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <!-- 主界面 -->
  <div class="container" id="mainContainer" style="display:none">
    <div class="header">
      <div class="logo">万古长夜</div>
      <div class="player-info">
        <div class="stat">
          <span class="stat-icon">💰</span>
          <span class="stat-value" id="goldDisplay">0</span>
        </div>
        <div class="stat">
          <span class="stat-icon">💎</span>
          <span class="stat-value" id="gemsDisplay">0</span>
        </div>
        <div class="stat">
          <span class="stat-icon">⚔️</span>
          <span class="stat-value"><span id="winsDisplay">0</span>/<span id="lossesDisplay">0</span></span>
        </div>
        <div class="stat" style="cursor:pointer" onclick="logout()">
          <span>退出</span>
        </div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="cards">卡牌图鉴</div>
      <div class="tab" data-tab="draw">祈愿抽卡</div>
      <div class="tab" data-tab="battle">对战竞技</div>
      <div class="tab" data-tab="collection">我的卡牌</div>
      <div class="tab" data-tab="ranking">排行榜</div>
    </div>

    <!-- 卡牌图鉴 -->
    <div class="content active" id="cardsContent">
      <h2 style="text-align:center;margin-bottom:20px;font-size:28px;color:#ffd700">五大阵营</h2>
      <div class="factions" id="factionsList"></div>
      <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <!-- 祈愿抽卡 -->
    <div class="content" id="drawContent">
      <div class="draw-area">
        <h2 style="margin-bottom:30px;font-size:28px;color:#ffd700">祈愿神坛</h2>
        <div class="draw-buttons">
          <div>
            <button class="draw-btn" onclick="drawCards(1)">单抽祈愿</button>
            <div class="draw-cost">消耗 100 金币</div>
          </div>
          <div>
            <button class="draw-btn" onclick="drawCards(10)">十连祈愿</button>
            <div class="draw-cost">消耗 1000 金币</div>
          </div>
        </div>
        <p style="color:#888;margin-top:20px">祈愿可能获得：凡品(50%) 灵品(30%) 仙品(15%) 圣品(4%) 万古品(1%)</p>
      </div>
    </div>

    <!-- 对战竞技 -->
    <div class="content" id="battleContent">
      <div class="battle-arena">
        <div class="battle-field">
          <div class="player-side" id="playerSide">
            <div class="player-avatar">👤</div>
            <div class="player-name" id="playerBattleName">玩家</div>
            <div class="hp-bar"><div class="hp-fill" id="playerHpBar" style="width:100%"></div></div>
            <div class="hp-text">HP: <span id="playerHp">100</span>/100</div>
            <div class="mana-bar"><div class="mana-fill" id="playerManaBar" style="width:100%"></div></div>
            <div style="color:#3498db;margin-top:5px">法力: <span id="playerMana">5</span>/5</div>
          </div>
          
          <div class="vs-icon">VS</div>
          
          <div class="player-side" id="enemySide">
            <div class="player-avatar" style="background:linear-gradient(135deg,#8b0000,#4a0000)">👹</div>
            <div class="player-name">幻境魔灵</div>
            <div class="hp-bar"><div class="hp-fill" id="enemyHpBar" style="width:100%"></div></div>
            <div class="hp-text">HP: <span id="enemyHp">100</span>/100</div>
          </div>
        </div>
        
        <div class="hand" id="battleHand"></div>
        
        <div style="text-align:center;margin-top:20px">
          <button class="draw-btn" onclick="startBattle()" id="startBattleBtn">开始对战</button>
          <button class="draw-btn" onclick="attack()" id="attackBtn" style="display:none;margin-left:10px">发动攻击</button>
        </div>
        
        <div class="battle-log" id="battleLog"></div>
      </div>
    </div>

    <!-- 我的卡牌 -->
    <div class="content" id="collectionContent">
      <h2 style="text-align:center;margin-bottom:20px;font-size:28px;color:#ffd700">我的收藏</h2>
      <div class="cards-grid" id="collectionGrid"></div>
    </div>

    <!-- 排行榜 -->
    <div class="content" id="rankingContent">
      <h2 style="text-align:center;margin-bottom:20px;font-size:28px;color:#ffd700">天下英雄榜</h2>
      <table class="ranking-table">
        <thead>
          <tr>
            <th>排名</th>
            <th>修士</th>
            <th>等级</th>
            <th>胜场</th>
            <th>败场</th>
            <th>胜率</th>
          </tr>
        </thead>
        <tbody id="rankingBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 抽卡结果弹窗 -->
  <div class="draw-result" id="drawResult">
    <h2 style="font-size:32px;color:#ffd700;margin-bottom:20px">祈愿结果</h2>
    <div class="draw-cards" id="drawCardsResult"></div>
    <button class="close-result" onclick="closeDrawResult()">确认</button>
  </div>

  <a href="/" class="back-btn">← 返回首页</a>

  <script>
    // ========== 全局变量 ==========
    let currentUser = null;
    let currentPlayer = null;
    let playerCards = [];
    let allCards = [];
    let selectedCard = null;
    let battleState = null;
    let isLoginMode = true;

    const API = 'http://localhost:18790/api';

    // ========== 粒子系统 ==========
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = (5 + Math.random() * 5) + 's';
        container.appendChild(particle);
      }
    }

    // ========== 特效系统 ==========
    function showAttackEffect(x, y) {
      const layer = document.getElementById('effectLayer');
      const effect = document.createElement('div');
      effect.className = 'attack-effect';
      effect.style.left = (x - 100) + 'px';
      effect.style.top = (y - 100) + 'px';
      layer.appendChild(effect);
      setTimeout(() => effect.remove(), 500);
    }

    // ========== 登录注册 ==========
    function toggleLoginMode() {
      isLoginMode = !isLoginMode;
      document.getElementById('nickname').style.display = isLoginMode ? 'none' : 'block';
      document.getElementById('loginBtn').textContent = isLoginMode ? '登录' : '注册';
      document.getElementById('switchBtn').textContent = isLoginMode ? '注册账号' : '返回登录';
      document.getElementById('errorMsg').textContent = '';
    }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const nickname = document.getElementById('nickname').value.trim();

      if (!username || !password) {
        document.getElementById('errorMsg').textContent = '请填写用户名和密码';
        return;
      }

      try {
        const url = isLoginMode ? `${API}/login` : `${API}/register`;
        const body = isLoginMode 
          ? { username, password }
          : { username, password, nickname };

        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();
        
        if (data.success) {
          currentUser = data.data;
          localStorage.setItem('wanguUser', JSON.stringify(currentUser));
          await loadPlayerData();
          showMainInterface();
        } else {
          document.getElementById('errorMsg').textContent = data.error || '操作失败';
        }
      } catch (err) {
        document.getElementById('errorMsg').textContent = '网络错误';
      }
    }

    function logout() {
      localStorage.removeItem('wanguUser');
      currentUser = null;
      currentPlayer = null;
      document.getElementById('loginOverlay').style.display = 'flex';
      document.getElementById('mainContainer').style.display = 'none';
    }

    // ========== 数据加载 ==========
    async function loadPlayerData() {
      if (!currentUser) return;
      
      try {
        const res = await fetch(`${API}/game/player/${currentUser.id}`);
        const data = await res.json();
        currentPlayer = data.player;
        playerCards = data.cards || [];
        
        updateUI();
      } catch (err) {
        console.error('加载玩家数据失败', err);
      }
    }

    async function loadAllCards() {
      try {
        const res = await fetch(`${API}/game/cards`);
        const data = await res.json();
        allCards = data.cards || [];
        renderFactions();
        renderCards(allCards);
      } catch (err) {
        console.error('加载卡牌失败', err);
      }
    }

    async function loadRanking() {
      try {
        const res = await fetch(`${API}/game/ranking`);
        const data = await res.json();
        renderRanking(data.ranking || []);
      } catch (err) {
        console.error('加载排行榜失败', err);
      }
    }

    // ========== UI更新 ==========
    function updateUI() {
      if (!currentPlayer) return;
      
      document.getElementById('goldDisplay').textContent = currentPlayer.gold || 0;
      document.getElementById('gemsDisplay').textContent = currentPlayer.gems || 0;
      document.getElementById('winsDisplay').textContent = currentPlayer.wins || 0;
      document.getElementById('lossesDisplay').textContent = currentPlayer.losses || 0;
      
      renderCollection();
    }

    function showMainInterface() {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainContainer').style.display = 'block';
      loadAllCards();
      loadRanking();
    }

    // ========== 渲染函数 ==========
    function renderFactions() {
      const container = document.getElementById('factionsList');
      const factions = [
        { name: '幽冥', icon: '👻', color: '#4a0080', desc: '幽暗冥界，魂火飘渺' },
        { name: '昆仑', icon: '❄️', color: '#4fc3f7', desc: '雪白仙境，云海飘渺' },
        { name: '蓬莱', icon: '🌸', color: '#f8bbd9', desc: '桃花仙岛，芬芳四溢' },
        { name: '蛮荒', icon: '🔥', color: '#ff6f00', desc: '荒野大地，火焰燃烧' },
        { name: '万古', icon: '⭐', color: '#ffd700', desc: '万古长夜，星光璀璨' }
      ];

      container.innerHTML = factions.map(f => `
        <div class="faction-card" data-faction="${f.name}" onclick="filterByFaction('${f.name}')">
          <div class="faction-icon" style="background:${f.color}">${f.icon}</div>
          <div class="faction-name">${f.name}</div>
          <div class="faction-desc">${f.desc}</div>
        </div>
      `).join('');
    }

    function renderCards(cards) {
      const container = document.getElementById('cardsGrid');
      container.innerHTML = cards.map(card => createCardHTML(card)).join('');
    }

    function renderCollection() {
      const container = document.getElementById('collectionGrid');
      if (playerCards.length === 0) {
        container.innerHTML = '<p style="text-align:center;width:100%;color:#888">暂无卡牌，去祈愿抽卡吧！</p>';
        return;
      }
      container.innerHTML = playerCards.map(card => createCardHTML({
        ...card,
        id: card.card_id
      })).join('');
    }

    function renderRanking(ranking) {
      const tbody = document.getElementById('rankingBody');
      tbody.innerHTML = ranking.map((r, i) => {
        const winRate = r.wins + r.losses > 0 
          ? Math.round(r.wins / (r.wins + r.losses) * 100) 
          : 0;
        const rankClass = i < 3 ? `rank-${i+1}` : '';
        return `
          <tr>
            <td class="${rankClass}">${i + 1}</td>
            <td>${r.nickname}</td>
            <td>${r.level}</td>
            <td>${r.wins}</td>
            <td>${r.losses}</td>
            <td>${winRate}%</td>
          </tr>
        `;
      }).join('');
    }

    function createCardHTML(card) {
      const rarityClass = `rarity-${card.rarity}`;
      const rarityColors = {
        '凡品': '#8b8b8b',
        '灵品': '#4fc3f7',
        '仙品': '#ab47bc',
        '圣品': '#ff9800',
        '万古品': '#ffd700'
      };
      
      return `
        <div class="card ${rarityClass}" onclick="selectCard('${card.id}')">
          <div class="card-inner">
            <img class="card-image" src="${card.image_url}" alt="${card.name}" 
                 onerror="this.src='https://picsum.photos/seed/${card.name}/512/768'">
            <div class="card-info">
              <div class="card-name">${card.name}</div>
              <div class="card-rarity" style="background:${rarityColors[card.rarity]}">${card.rarity}</div>
              <div style="font-size:12px;color:#888">${card.faction}</div>
              <div class="card-stats">
                <div class="card-stat">⚔️${card.attack}</div>
                <div class="card-stat">🛡️${card.defense}</div>
                <div class="card-stat">❤️${card.hp}</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ========== 交互功能 ==========
    function filterByFaction(faction) {
      document.querySelectorAll('.faction-card').forEach(el => {
        el.classList.toggle('selected', el.dataset.faction === faction);
      });
      
      const filtered = allCards.filter(c => c.faction === faction);
      renderCards(filtered.length > 0 ? filtered : allCards);
    }

    function selectCard(id) {
      selectedCard = allCards.find(c => c.id === id) || playerCards.find(c => c.card_id === id);
      console.log('选中卡牌:', selectedCard);
    }

    // ========== 抽卡系统 ==========
    async function drawCards(count) {
      if (!currentPlayer) return;
      
      const cost = count * 100;
      if (currentPlayer.gold < cost) {
        alert('金币不足！');
        return;
      }

      try {
        const res = await fetch(`${API}/game/draw`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerId: currentPlayer.id, count })
        });

        const data = await res.json();
        
        if (data.error) {
          alert(data.error);
          return;
        }

        showDrawResult(data.cards);
        await loadPlayerData();
      } catch (err) {
        console.error('抽卡失败', err);
      }
    }

    function showDrawResult(cards) {
      const container = document.getElementById('drawCardsResult');
      container.innerHTML = cards.map((card, i) => `
        <div class="draw-card-item" style="animation-delay:${i * 0.2}s">
          ${createCardHTML(card)}
        </div>
      `).join('');
      
      document.getElementById('drawResult').classList.add('show');
    }

    function closeDrawResult() {
      document.getElementById('drawResult').classList.remove('show');
    }

    // ========== 对战系统 ==========
    function startBattle() {
      if (playerCards.length === 0) {
        alert('请先抽卡获得卡牌！');
        return;
      }

      battleState = {
        playerHp: 100,
        enemyHp: 100,
        playerMana: 5,
        turn: 1
      };

      document.getElementById('startBattleBtn').style.display = 'none';
      document.getElementById('attackBtn').style.display = 'inline-block';
      
      // 随机选择5张手牌
      const hand = [...playerCards].sort(() => Math.random() - 0.5).slice(0, 5);
      renderBattleHand(hand);
      
      addBattleLog('⚔️ 对战开始！');
    }

    function renderBattleHand(cards) {
      const container = document.getElementById('battleHand');
      container.innerHTML = cards.map(card => `
        <div class="hand-card ${selectedCard?.card_id === card.card_id ? 'selected' : ''}" 
             onclick="selectBattleCard('${card.card_id}')">
          ${createCardHTML({ ...card, id: card.card_id })}
        </div>
      `).join('');
    }

    function selectBattleCard(cardId) {
      selectedCard = playerCards.find(c => c.card_id === cardId);
      document.querySelectorAll('.hand-card').forEach(el => {
        el.classList.remove('selected');
      });
      event.currentTarget.classList.add('selected');
    }

    async function attack() {
      if (!selectedCard) {
        alert('请选择一张卡牌！');
        return;
      }

      try {
        const res = await fetch(`${API}/game/battle`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            playerId: currentPlayer.id, 
            cardId: selectedCard.card_id 
          })
        });

        const data = await res.json();
        
        if (data.error) {
          alert(data.error);
          return;
        }

        // 显示攻击特效
        const enemySide = document.getElementById('enemySide');
        const rect = enemySide.getBoundingClientRect();
        showAttackEffect(rect.left + rect.width/2, rect.top + rect.height/2);

        // 更新战斗状态
        battleState.enemyHp -= data.damage;
        if (battleState.enemyHp < 0) battleState.enemyHp = 0;
        
        // 敌人反击
        const enemyDamage = 5 + Math.floor(Math.random() * 10);
        battleState.playerHp -= enemyDamage;
        if (battleState.playerHp < 0) battleState.playerHp = 0;

        updateBattleUI();
        
        addBattleLog(`${data.cardName} 对敌人造成 <span class="damage">${data.damage}</span> 点伤害！`);
        addBattleLog(`敌人反击造成 <span class="damage">${enemyDamage}</span> 点伤害！`);

        // 检查胜负
        if (battleState.playerHp <= 0) {
          endBattle(false);
        } else if (battleState.enemyHp <= 0) {
          endBattle(true);
        }
      } catch (err) {
        console.error('攻击失败', err);
      }
    }

    function updateBattleUI() {
      document.getElementById('playerHp').textContent = battleState.playerHp;
      document.getElementById('enemyHp').textContent = battleState.enemyHp;
      document.getElementById('playerHpBar').style.width = battleState.playerHp + '%';
      document.getElementById('enemyHpBar').style.width = battleState.enemyHp + '%';
    }

    function addBattleLog(text) {
      const log = document.getElementById('battleLog');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = text;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
    }

    async function endBattle(won) {
      document.getElementById('startBattleBtn').style.display = 'inline-block';
      document.getElementById('attackBtn').style.display = 'none';
      
      if (won) {
        addBattleLog('🎉 <span class="heal">胜利！获得50金币奖励！</span>');
      } else {
        addBattleLog('💀 战败...再接再厉！');
      }

      await loadPlayerData();
    }

    // ========== 标签切换 ==========
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        
        tab.classList.add('active');
        const contentId = tab.dataset.tab + 'Content';
        document.getElementById(contentId).classList.add('active');
        
        if (tab.dataset.tab === 'ranking') {
          loadRanking();
        }
      });
    });

    // ========== 初始化 ==========
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('switchBtn').addEventListener('click', toggleLoginMode);

    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });

    // 检查本地存储
    const savedUser = localStorage.getItem('wanguUser');
    if (savedUser) {
      currentUser = JSON.parse(savedUser);
      loadPlayerData().then(() => showMainInterface());
    }

    createParticles();
  </script>
</body>
</html>
