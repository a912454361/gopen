name: Build Windows Installer

on:
  push:
    branches: [ main ]
    paths:
      - 'electron-app/**'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install pnpm
      run: npm install -g pnpm
        
    - name: Install dependencies
      working-directory: ./electron-app
      run: pnpm install --frozen-lockfile
        
    - name: Build NSIS Installer
      working-directory: ./electron-app
      run: pnpm run build:nsis
      
    - name: Build Portable
      working-directory: ./electron-app
      run: pnpm run build:portable
        
    - name: List output files
      working-directory: ./electron-app/release
      run: dir
        
    - name: Upload NSIS Installer
      uses: actions/upload-artifact@v4
      with:
        name: G-Open-Setup
        path: electron-app/release/*Setup*.exe
        
    - name: Upload Portable
      uses: actions/upload-artifact@v4
      with:
        name: G-Open-Portable
        path: electron-app/release/*Portable*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Download NSIS Installer
      uses: actions/download-artifact@v4
      with:
        name: G-Open-Setup
        path: ./artifacts/
        
    - name: Download Portable
      uses: actions/download-artifact@v4
      with:
        name: G-Open-Portable
        path: ./artifacts/
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: G Open AI助手 v${{ github.event.inputs.version }}
        body: |
          ## G Open AI助手 v${{ github.event.inputs.version }}
          
          ### 功能特性
          - 集成 35+ AI 模型
          - 多模态支持：对话、图像生成、视频生成
          - 项目管理系统
          - 云存储同步
          - 会员体系和支付系统
          
          ### 下载说明
          - **Setup.exe**: 一键安装程序，自动创建快捷方式
          - **Portable.exe**: 便携版，无需安装，双击即用
          
          ### 安全功能
          - 单实例检测
          - 上下文隔离和沙盒模式
          - URL安全验证
          - 应用完整性校验
          - CSP安全策略
        files: ./artifacts/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
