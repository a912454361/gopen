<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>万古长夜 - 国风粒子卡牌游戏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'STKaiti', 'KaiTi', serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e8d5b7;
      overflow: hidden;
    }

    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px; height: 4px;
      background: radial-gradient(circle, #ffd700 0%, transparent 70%);
      border-radius: 50%;
      animation: float 10s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
      50% { transform: translateY(-150px) translateX(50px); opacity: 1; }
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-size: 72px;
      font-weight: bold;
      background: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 200%;
      animation: shimmer 3s infinite;
      letter-spacing: 20px;
      margin-bottom: 20px;
      text-shadow: 0 0 60px rgba(255,215,0,0.5);
    }

    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .subtitle {
      font-size: 24px;
      color: rgba(232, 213, 183, 0.7);
      letter-spacing: 8px;
      margin-bottom: 60px;
    }

    .factions-icons {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 60px;
    }

    .faction-icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 0 30px rgba(255,215,0,0.3);
      animation: pulse 2s infinite;
      animation-delay: calc(var(--i) * 0.2s);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .btn {
      padding: 20px 60px;
      font-size: 24px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      border: none;
      color: #1a1a2e;
      font-weight: bold;
      box-shadow: 0 10px 40px rgba(255,215,0,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 20px 60px rgba(255,215,0,0.6);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid rgba(255,215,0,0.5);
      color: #ffd700;
    }

    .btn-secondary:hover {
      background: rgba(255,215,0,0.1);
      border-color: #ffd700;
    }

    .footer {
      position: fixed;
      bottom: 30px;
      left: 0; right: 0;
      text-align: center;
      color: rgba(232, 213, 183, 0.3);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="container">
    <h1 class="logo">万古长夜</h1>
    <p class="subtitle">国风粒子卡牌游戏</p>
    
    <div class="factions-icons">
      <div class="faction-icon" style="background:#4a0080;--i:0">👻</div>
      <div class="faction-icon" style="background:#4fc3f7;--i:1">❄️</div>
      <div class="faction-icon" style="background:#f8bbd9;--i:2">🌸</div>
      <div class="faction-icon" style="background:#ff6f00;--i:3">🔥</div>
      <div class="faction-icon" style="background:linear-gradient(135deg,#ffd700,#ff8c00);--i:4">⭐</div>
    </div>

    <div class="buttons">
      <a href="game.html" class="btn btn-primary">进入游戏</a>
      <a href="admin.html" class="btn btn-secondary">管理后台</a>
    </div>
  </div>

  <div class="footer">
    五大阵营：幽冥 · 昆仑 · 蓬莱 · 蛮荒 · 万古
  </div>

  <script>
    // 创建粒子
    const container = document.getElementById('particles');
    for (let i = 0; i < 80; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 10 + 's';
      particle.style.animationDuration = (8 + Math.random() * 6) + 's';
      container.appendChild(particle);
    }
  </script>
</body>
</html>
