[build]
  # 构建命令
  command = "pnpm install && npx expo export --platform web"
  # 发布目录
  publish = "dist"
  # Node.js 版本
  environment = { NODE_VERSION = "20", NPM_FLAGS = "--version" }

# 使用 pnpm
[build.environment]
  PNPM_VERSION = "9"

# SPA 路由重定向（支持 expo-router）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 安全头
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 缓存静态资源
[[headers]]
  for = "/_expo/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
