# ==================================================
# 阿里云 ECS Nginx 配置 - G open 智能创作助手
# ==================================================
# 
# 部署位置: /etc/nginx/conf.d/gopen.conf
# SSL 证书位置: /etc/nginx/ssl/
#
# 安装步骤:
# 1. scp gopen-nginx.conf root@8.136.229.243:/etc/nginx/conf.d/gopen.conf
# 2. mkdir -p /etc/nginx/ssl
# 3. 上传 SSL 证书到 /etc/nginx/ssl/
# 4. nginx -t && nginx -s reload
#

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name gopen.com.cn api.gopen.com.cn test.gopen.com.cn;
    
    # Let's Encrypt 验证路径（申请证书时需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name gopen.com.cn api.gopen.com.cn;
    
    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/gopen.com.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/gopen.com.cn.key;
    
    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:9091;
        proxy_http_version 1.1;
        
        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:9091/api/v1/health;
        access_log off;
    }
    
    # 根路径（前端）
    location / {
        # 如果前端部署在 ECS，指向前端静态文件
        # root /var/www/gopen-frontend;
        # try_files $uri $uri/ /index.html;
        
        # 或者重定向到前端托管地址
        return 301 https://your-frontend-url.com$request_uri;
    }
}

# 测试环境（可选）
server {
    listen 443 ssl http2;
    server_name test.gopen.com.cn;
    
    ssl_certificate /etc/nginx/ssl/gopen.com.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/gopen.com.cn.key;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    location / {
        proxy_pass http://127.0.0.1:9091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# IP 直连访问（临时，仅 HTTP）
server {
    listen 9091;
    server_name 8.136.229.243;
    
    # 允许所有来源
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
    add_header Access-Control-Allow-Headers 'Content-Type, Authorization';
    
    location / {
        proxy_pass http://127.0.0.1:9091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
