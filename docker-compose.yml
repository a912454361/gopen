# ============================================
# G open 智能创作助手 - Docker Compose
# ============================================

version: '3.8'

services:
  # API 服务
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gopen-api
    restart: unless-stopped
    ports:
      - "9091:9091"
    environment:
      - NODE_ENV=production
    env_file:
      - ./server/.env
    networks:
      - gopen-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis 缓存 (可选)
  redis:
    image: redis:7-alpine
    container_name: gopen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gopen-network
    command: redis-server --appendonly yes

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: gopen-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - ./client/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - gopen-network

networks:
  gopen-network:
    driver: bridge

volumes:
  redis-data:
