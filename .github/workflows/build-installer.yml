name: Build Windows Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install frontend dependencies
      working-directory: ./client
      run: npm install --legacy-peer-deps
        
    - name: Build Expo web
      working-directory: ./client
      run: npx expo export --platform web --output-dir ../electron-app/dist
        
    - name: Install electron dependencies
      working-directory: ./electron-app
      run: npm install
        
    - name: Build NSIS Installer
      working-directory: ./electron-app
      run: npm run build:nsis
      
    - name: Build Portable
      working-directory: ./electron-app
      run: npm run build:portable
        
    - name: List output files
      working-directory: ./electron-app/release
      run: dir
        
    - name: Upload NSIS Installer
      uses: actions/upload-artifact@v4
      with:
        name: G-Open-Setup
        path: electron-app/release/*Setup*.exe
        
    - name: Upload Portable
      uses: actions/upload-artifact@v4
      with:
        name: G-Open-Portable
        path: electron-app/release/*Portable*.exe
