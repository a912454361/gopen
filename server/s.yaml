edition: 3.0.0
name: gopen-api
access: default

vars:
  region: cn-shanghai

resources:
  gopen-api:
    component: fc3
    props:
      region: ${vars.region}
      functionName: gopen-api
      description: G open 智能创作助手 API
      runtime: custom.debian10
      code: ./
      memorySize: 512
      cpu: 0.35
      timeout: 60
      instanceConcurrency: 100
      customRuntimeConfig:
        command:
          - node
          - dist/index.js
        port: 9091
      environmentVariables:
        NODE_ENV: production
        PORT: 9091
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            disableURLInternet: false
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - HEAD
              - OPTIONS
