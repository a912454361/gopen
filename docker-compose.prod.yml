# ============================================
# G open 智能创作助手 - 生产环境 Docker Compose
# ============================================

version: '3.8'

services:
  # ========================================
  # 后端 API 服务
  # ========================================
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gopen-api
    restart: unless-stopped
    ports:
      - "9091:9091"
    environment:
      - NODE_ENV=production
      - PORT=9091
    env_file:
      - ./server/.env
    networks:
      - gopen-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # 前端 Web 服务
  # ========================================
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gopen-frontend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    networks:
      - gopen-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # Redis 缓存服务
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: gopen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gopen-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  gopen-network:
    driver: bridge

volumes:
  redis-data:
