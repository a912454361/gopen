name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.4)'
        required: true
        default: '1.0.4'
      platforms:
        description: 'Platforms to build (android,ios,web)'
        required: true
        default: 'android,ios,web'

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ==================== Android 构建 ====================
  build-android:
    runs-on: ubuntu-latest
    if: contains(github.event.inputs.platforms, 'android') || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 📦 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: |
          cd client
          pnpm install

      - name: 🔨 Build Android APK
        run: |
          cd client
          eas build --platform android --profile android-apk --non-interactive --wait

      - name: 📥 Download APK
        run: |
          cd client
          eas build:list --platform android --limit 1 --json > ../build-info.json
          APK_URL=$(cat ../build-info.json | jq -r '.[0].artifacts.buildUrl')
          mkdir -p ../release/android
          curl -L -o "../release/android/gopen-${{ github.event.inputs.version || github.ref_name }}.apk" "$APK_URL"

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release/android/*.apk

  # ==================== iOS 构建 ====================
  build-ios:
    runs-on: ubuntu-latest
    if: contains(github.event.inputs.platforms, 'ios') || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 📦 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: |
          cd client
          pnpm install

      - name: 🔨 Build iOS IPA
        run: |
          cd client
          eas build --platform ios --profile ios-adhoc --non-interactive --wait

      - name: 📥 Download IPA
        run: |
          cd client
          eas build:list --platform ios --limit 1 --json > ../build-info.json
          IPA_URL=$(cat ../build-info.json | jq -r '.[0].artifacts.buildUrl')
          mkdir -p ../release/ios
          curl -L -o "../release/ios/gopen-${{ github.event.inputs.version || github.ref_name }}.ipa" "$IPA_URL"

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: release/ios/*.ipa

  # ==================== Web 构建 ====================
  build-web:
    runs-on: ubuntu-latest
    if: contains(github.event.inputs.platforms, 'web') || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 📦 Install dependencies
        run: |
          cd client
          pnpm install

      - name: 🔨 Build Web
        run: |
          cd client
          npx expo export --platform web --output-dir ../dist/web

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/web

  # ==================== Windows 安装包 ====================
  build-windows:
    runs-on: windows-latest
    needs: build-web
    if: contains(github.event.inputs.platforms, 'web') || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download Web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/web

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Electron Builder
        run: npm install -g electron-builder

      - name: 🔨 Build Windows Installer
        run: |
          # 创建 Electron 应用
          mkdir -p electron
          cp -r dist/web electron/
          
          # 创建 package.json
          echo '{
            "name": "gopen-desktop",
            "version": "${{ github.event.inputs.version || github.ref_name }}",
            "main": "main.js"
          }' > electron/package.json
          
          # 创建 main.js
          echo 'const { app, BrowserWindow } = require("electron");
          const path = require("path");
          
          function createWindow() {
            const win = new BrowserWindow({
              width: 1400,
              height: 900,
              backgroundColor: "#0A0A0F",
              webPreferences: {
                nodeIntegration: false
              }
            });
            win.loadFile(path.join(__dirname, "web", "index.html"));
          }
          
          app.whenReady().then(createWindow);
          
          app.on("window-all-closed", () => {
            if (process.platform !== "darwin") app.quit();
          });' > electron/main.js
          
          # 构建
          cd electron
          electron-builder --win --x64 --ia64

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: electron/dist/*.exe

  # ==================== macOS DMG ====================
  build-macos:
    runs-on: macos-latest
    needs: build-web
    if: contains(github.event.inputs.platforms, 'web') || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download Web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/web

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Electron Builder
        run: npm install -g electron-builder

      - name: 🔨 Build macOS DMG
        run: |
          # 创建 Electron 应用
          mkdir -p electron
          cp -r dist/web electron/
          
          # 创建 package.json
          echo '{
            "name": "gopen-desktop",
            "version": "${{ github.event.inputs.version || github.ref_name }}",
            "main": "main.js"
          }' > electron/package.json
          
          # 创建 main.js
          echo 'const { app, BrowserWindow } = require("electron");
          const path = require("path");
          
          function createWindow() {
            const win = new BrowserWindow({
              width: 1400,
              height: 900,
              backgroundColor: "#0A0A0F",
              webPreferences: {
                nodeIntegration: false
              }
            });
            win.loadFile(path.join(__dirname, "web", "index.html"));
          }
          
          app.whenReady().then(createWindow);
          
          app.on("window-all-closed", () => {
            if (process.platform !== "darwin") app.quit();
          });' > electron/main.js
          
          # 构建
          cd electron
          electron-builder --mac --x64 --arm64

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: electron/dist/*.dmg

  # ==================== 发布到 GitHub ====================
  release:
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: 📝 Generate Release Notes
        id: notes
        run: |
          cat > release_notes.md << EOF
          # G open 智能创作助手 ${{ github.ref_name }}

          ## 🎉 新功能

          ### 厂商自主存储系统
          - ✅ 厂商可配置自己的存储服务（阿里云 OSS / 腾讯云 COS / AWS S3 / MinIO）
          - ✅ 存储凭证 AES-256 加密存储，确保安全
          - ✅ 文件存储到厂商自己的账户，平台只提供接口层

          ### AI 模型服务
          - ✅ 支持 LLM、图像生成、视频生成、音频处理
          - ✅ 多模型负载均衡和故障转移

          ## 📦 下载

          | 平台 | 文件 | 说明 |
          |------|------|------|
          | Android | gopen-${{ github.ref_name }}.apk | Android 安装包 |
          | iOS | gopen-${{ github.ref_name }}.ipa | iOS 安装包 |
          | Windows | gopen-${{ github.ref_name }}-setup.exe | Windows 安装程序 |
          | macOS | gopen-${{ github.ref_name }}.dmg | macOS 安装镜像 |

          ## 🔗 链接

          - 官方网站: https://woshiguotao.cn
          - 文档: https://woshiguotao.cn/docs
          - GitHub: https://github.com/a912454361/gopen
          EOF

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: |
            release/android-apk/*.apk
            release/ios-ipa/*.ipa
            release/windows-installer/*.exe
            release/macos-dmg/*.dmg
          draft: false
          prerelease: false
